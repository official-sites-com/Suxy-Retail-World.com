<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUXY Retail World | Order</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0a0a0a; 
            color: #f5f5f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        /* Navigation */
        nav { 
            background: rgba(26, 26, 26, 0.95); 
            padding: 15px 0; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid #d4af37;
        }
        .nav-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            font-family: Georgia, 'Times New Roman', serif;
            color: #d4af37; 
            font-size: 28px; 
            font-weight: bold;
            text-decoration: none;
        }
        .logo span { 
            color: #fff; 
            font-size: 11px; 
            display: block; 
            font-family: sans-serif; 
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            color: #ccc; 
            text-decoration: none; 
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
        }
        .nav-links a:hover, .nav-links a.active { 
            color: #d4af37;
            border-bottom-color: #d4af37;
        }
        .cart-badge {
            background: #d4af37;
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 5px;
            font-weight: bold;
        }
        .mobile-menu-btn { 
            display: none; 
            background: none; 
            border: none; 
            color: #fff; 
            font-size: 20px;
            cursor: pointer;
        }
        
        /* Main Content */
        main { padding-top: 120px; min-height: 100vh; padding-bottom: 150px; }
        
        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }
        .page-header h1 {
            font-family: Georgia, serif;
            font-size: 42px;
            color: #fff;
            margin-bottom: 15px;
        }
        .page-header h1::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: #d4af37;
            margin: 20px auto 0;
        }
        .page-header p {
            color: #999;
            font-size: 18px;
            max-width: 600px;
            margin: 25px auto 0;
        }
        
        /* Filters */
        .filters { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 50px;
            padding: 0 20px;
        }
        .filter-btn { 
            padding: 12px 28px; 
            background: transparent;
            border: 1px solid #444;
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active { 
            border-color: #d4af37; 
            color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }
        
        /* Items Grid */
        .items-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 35px;
            padding: 0 20px;
        }
        .item-card { 
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
        }
        .item-card:hover { 
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .item-card.selected { 
            border: 2px solid #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }
        .item-card.selected::after {
            content: '\\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 15px;
            right: 15px;
            background: #d4af37;
            color: #000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .item-card.unavailable {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }
        .item-card.unavailable:hover {
            transform: none;
            border-color: #333;
            box-shadow: none;
        }
        .item-image { 
            height: 280px; 
            overflow: hidden;
            position: relative;
            background: #1a1a1a;
        }
        .item-image img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transition: transform 0.6s;
            /* FIX 3: Force image rendering optimization */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        .item-card:hover .item-image img { transform: scale(1.1); }
        .item-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #d4af37;
            color: #000;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .item-badge.sold-out {
            background: #dc3545;
            color: #fff;
        }
        .item-info { padding: 25px; }
        .item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 15px;
        }
        .item-name { 
            font-family: Georgia, serif;
            font-size: 20px; 
            color: #fff;
            flex: 1;
            line-height: 1.3;
        }
        .item-price { 
            color: #d4af37; 
            font-weight: bold;
            font-size: 20px;
            white-space: nowrap;
        }
        .item-desc { 
            color: #777; 
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            height: 48px;
            overflow: hidden;
        }
        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .item-category { 
            font-size: 12px; 
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
        }
        .item-action {
            color: #d4af37;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .item-card.selected .item-action {
            color: #fff;
        }
        .item-card.unavailable .item-action {
            color: #666;
        }
        
        /* Empty State */
        .empty-state { 
            text-align: center; 
            padding: 100px 20px;
            color: #666;
            grid-column: 1 / -1;
        }
        .empty-state i { 
            font-size: 80px; 
            margin-bottom: 30px; 
            color: #333; 
            display: block;
        }
        .empty-state h3 {
            color: #888;
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        /* Loading */
        .loading-container {
            display: flex;
            justify-content: center;
            padding: 100px;
            grid-column: 1 / -1;
        }
        .spinner { 
            width: 60px; 
            height: 60px; 
            border: 4px solid #333;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Floating Cart */
        .floating-cart { 
            position: fixed; 
            bottom: 40px; 
            right: 40px;
            z-index: 100;
        }
        .floating-cart a { 
            display: flex; 
            align-items: center; 
            gap: 12px;
            background: #d4af37;
            color: #000;
            padding: 18px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }
        .floating-cart a:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .floating-cart.hidden { display: none; }
        
        /* Cart Sync Notice */
        .sync-notice {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(212, 175, 55, 0.95);
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        /* Footer */
        footer { 
            background: #000; 
            padding: 50px 0 30px; 
            text-align: center;
            border-top: 1px solid #222;
        }
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 30px; 
        }
        .social-links a { 
            color: #666; 
            font-size: 28px;
            transition: all 0.3s;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid #333;
            text-decoration: none;
        }
        .social-links a:hover { 
            color: #fff;
            border-color: currentColor;
            transform: translateY(-3px);
        }
        .social-links a.whatsapp:hover { color: #25d366; border-color: #25d366; }
        .social-links a.tiktok:hover { color: #ff0050; border-color: #ff0050; }
        .social-links a.phone:hover { color: #007bff; border-color: #007bff; }
        
        /* Mobile */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .page-header h1 { font-size: 32px; }
            .page-header p { font-size: 16px; }
            .items-grid { 
                grid-template-columns: 1fr; 
                gap: 25px;
                padding: 0 15px;
            }
            .item-image { height: 250px; }
            .floating-cart { 
                bottom: 20px; 
                right: 20px;
                left: 20px;
            }
            .floating-cart a {
                justify-content: center;
                padding: 16px 25px;
            }
            .sync-notice {
                left: 20px;
                right: 20px;
                transform: none;
                text-align: center;
            }
            @keyframes slideDown {
                from { transform: translateY(-20px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Main Content -->
    <main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAOoMeyH1QKMNhJ6ICfeLo2kEFeeYTEFcg",
            authDomain: "suxyretailworld.firebaseapp.com",
            projectId: "suxyretailworld",
            storageBucket: "suxyretailworld.firebasestorage.app",
            messagingSenderId: "615863570909",
            appId: "1:615863570909:web:79f66a04ec60c9845b2634"
        };

        let db;
        let allItems = [];
        let validItemIds = new Set();
        let cart = JSON.parse(localStorage.getItem('suxy_cart')) || [];
        let currentFilter = 'all';

        // FIX 3 & 5: Image transformation configuration
        const IMAGE_CONFIG = {
            cardWidth: 400,
            cardHeight: 350,
            quality: 'q_auto',
            format: 'f_auto',
            fit: 'c_fill',
            loading: 'lazy'
        };

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cat = urlParams.get('cat');
            if (cat) {
                currentFilter = cat;
                updateFilterButtons();
            }
            
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                
                db.collection('items').onSnapshot((snapshot) => {
                    const now = new Date();
                    allItems = [];
                    validItemIds.clear();
                    
                    snapshot.docs.forEach(doc => {
                        const item = {
                            id: doc.id,
                            ...doc.data()
                        };
                        allItems.push(item);
                        
                        const isExpired = item.expiry && new Date(item.expiry) < now;
                        const isDeleted = item.deletedAt !== null && item.deletedAt !== undefined;
                        
                        if (!isExpired && !isDeleted) {
                            validItemIds.add(doc.id);
                        }
                    });
                    
                    renderItems();
                    validateCart();
                });
                
            } catch (e) {
                console.error('Firebase error:', e);
                document.getElementById('itemsContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Connection Error</h3>
                        <p>Please check your internet connection</p>
                    </div>
                `;
            }
            
            updateCartUI();
        });

        // FIX 3 & 5: Apply Cloudinary transformations to any URL
        function getTransformedImageUrl(url, width, height) {
            if (!url) return 'https://via.placeholder.com/400x350?text=No+Image';
            
            // If already a Cloudinary URL with transformations, return as-is
            if (url.includes('/upload/') && (url.includes('w_') || url.includes('q_auto'))) {
                // Replace existing dimensions if different
                if (width && height) {
                    return url.replace(/w_\d+,h_\d+,c_\w+/g, `w_${width},h_${height},${IMAGE_CONFIG.fit}`);
                }
                return url;
            }
            
            // If Cloudinary URL without transformations, add them
            if (url.includes('cloudinary.com') && url.includes('/upload/')) {
                const transform = `w_${width || IMAGE_CONFIG.cardWidth},h_${height || IMAGE_CONFIG.cardHeight},${IMAGE_CONFIG.fit},${IMAGE_CONFIG.quality},${IMAGE_CONFIG.format}`;
                return url.replace('/upload/', `/upload/${transform}/`);
            }
            
            // Non-Cloudinary URLs return as-is (with placeholder fallback)
            return url;
        }

        // FIX 3: Get responsive image srcset for different screen sizes
        function getResponsiveSrc(url, baseWidth) {
            const sizes = [400, 800, 1200];
            return sizes.map(w => {
                const transformed = getTransformedImageUrl(url, w, Math.round(w * 0.875));
                return `${transformed} ${w}w`;
            }).join(', ');
        }

        function renderItems() {
            const container = document.getElementById('itemsContainer');
            const now = new Date();
            
            let filtered = allItems.filter(item => {
                if (currentFilter !== 'all' && item.category !== currentFilter) return false;
                return true;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>No items available</h3>
                        <p>Check back soon for new arrivals or try a different category</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(item => {
                const isSelected = cart.find(c => c.id === item.id);
                const isExpired = item.expiry && new Date(item.expiry) < now;
                const isDeleted = item.deletedAt !== null && item.deletedAt !== undefined;
                const isUnavailable = isExpired || isDeleted;
                
                // FIX 3 & 5: Force resize with Cloudinary transformations
                const imageUrl = getTransformedImageUrl(
                    item.imageUrl || item.thumbnailUrl, 
                    IMAGE_CONFIG.cardWidth, 
                    IMAGE_CONFIG.cardHeight
                );
                
                // Generate srcset for responsive images
                const srcset = getResponsiveSrc(item.imageUrl || item.thumbnailUrl, IMAGE_CONFIG.cardWidth);
                
                return `
                    <div class="item-card ${isSelected ? 'selected' : ''} ${isUnavailable ? 'unavailable' : ''}" 
                         onclick="${isUnavailable ? '' : `toggleCart('${item.id}')`}">
                        <div class="item-image">
                            <img 
                                src="${imageUrl}" 
                                srcset="${srcset}"
                                sizes="(max-width: 768px) 100vw, (max-width: 1200px) 50vw, 33vw"
                                alt="${item.name}" 
                                loading="${IMAGE_CONFIG.loading}"
                                decoding="async"
                                onerror="this.src='https://via.placeholder.com/400x350?text=No+Image'"
                            >
                            <span class="item-badge ${isUnavailable ? 'sold-out' : ''}">
                                ${isUnavailable ? (isDeleted ? 'Removed' : 'Expired') : item.category}
                            </span>
                        </div>
                        <div class="item-info">
                            <div class="item-header">
                                <h3 class="item-name">${item.name}</h3>
                                <span class="item-price">₦${item.price.toLocaleString()}</span>
                            </div>
                            <p class="item-desc">${item.description || 'Premium quality item from SUXY Retail World'}</p>
                            <div class="item-footer">
                                <span class="item-category">${item.category}</span>
                                <span class="item-action">
                                    ${isUnavailable 
                                        ? '<i class="fas fa-ban"></i> Unavailable' 
                                        : (isSelected 
                                            ? '<i class="fas fa-check"></i> Selected' 
                                            : '<i class="fas fa-plus"></i> Select Item')}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleCart(id) {
            if (!validItemIds.has(id)) {
                showToast('This item is no longer available');
                return;
            }
            
            const idx = cart.findIndex(c => c.id === id);
            
            if (idx > -1) {
                cart.splice(idx, 1);
                showToast('Item removed from cart');
            } else {
                const item = allItems.find(i => i.id === id);
                if (item) {
                    const now = new Date();
                    const isExpired = item.expiry && new Date(item.expiry) < now;
                    const isDeleted = item.deletedAt !== null && item.deletedAt !== undefined;
                    
                    if (!isExpired && !isDeleted) {
                        // FIX 3: Store transformed URLs in cart for purchase page
                        const cartItem = {
                            ...item,
                            imageUrl: getTransformedImageUrl(item.imageUrl, 200, 200),
                            originalUrl: item.imageUrl
                        };
                        cart.push(cartItem);
                        showToast('Item added to cart');
                    } else {
                        showToast('This item is no longer available');
                        renderItems();
                    }
                }
            }
            
            saveCart();
            renderItems();
            updateCartUI();
        }

        function validateCart() {
            if (cart.length === 0) return;
            
            const originalCount = cart.length;
            const now = new Date();
            const removedItems = [];
            
            cart = cart.filter(item => {
                const liveItem = allItems.find(i => i.id === item.id);
                
                if (!liveItem) {
                    removedItems.push(item.name);
                    return false;
                }
                
                if (liveItem.expiry && new Date(liveItem.expiry) < now) {
                    removedItems.push(item.name);
                    return false;
                }
                
                if (liveItem.deletedAt !== null && liveItem.deletedAt !== undefined) {
                    removedItems.push(item.name);
                    return false;
                }
                
                return true;
            });
            
            const removedCount = originalCount - cart.length;
            
            if (removedCount > 0) {
                saveCart();
                updateCartUI();
                renderItems();
                
                const notice = document.getElementById('syncNotice');
                const noticeText = notice.querySelector('span');
                noticeText.textContent = `${removedCount} item(s) removed - no longer available`;
                notice.style.display = 'flex';
                
                setTimeout(() => {
                    notice.style.display = 'none';
                }, 4000);
            }
        }

        function saveCart() {
            localStorage.setItem('suxy_cart', JSON.stringify(cart));
        }

        function updateCartUI() {
            const count = cart.length;
            const badge = document.getElementById('cartBadge');
            const floatingCart = document.getElementById('floatingCart');
            const cartCount = document.getElementById('cartCount');
            
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline';
                floatingCart.classList.remove('hidden');
                cartCount.textContent = count;
            } else {
                badge.style.display = 'none';
                floatingCart.classList.add('hidden');
            }
        }

        function filterItems(cat) {
            currentFilter = cat;
            updateFilterButtons();
            renderItems();
            
            const url = new URL(window.location);
            if (cat === 'all') url.searchParams.delete('cat');
            else url.searchParams.set('cat', cat);
            window.history.pushState({}, '', url);
        }

        function updateFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                const btnCat = btn.textContent.toLowerCase().replace(' items', '').replace(' ', '');
                if ((currentFilter === 'all' && btn.textContent === 'All Items') ||
                    btnCat === currentFilter) {
                    btn.classList.add('active');
                }
            });
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        function showToast(message) {
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%) translateY(100px);
                background: #d4af37;
                color: #000;
                padding: 15px 30px;
                border-radius: 50px;
                font-weight: bold;
                z-index: 3000;
                transition: all 0.3s;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.style.transform = 'translateX(-50%) translateY(0)';
            });
            
            setTimeout(() => {
                toast.style.transform = 'translateX(-50%) translateY(100px)';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
    </script>

</body>
</html>
